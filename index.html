<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title-meta">一ノ瀬なつみ 情報ページ</title>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    /* 全体の基本設定 */
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; margin: 0; padding: 0; color: #5D4037; background-color: #FFFDF5; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; background-color: #fff; min-height: 100vh; box-shadow: 0 0 15px rgba(255, 183, 77, 0.15); }
    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #FFCC80; padding-bottom: 10px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .header-title-area { display: flex; align-items: center; gap: 15px; }
    h1 { margin: 0; font-size: 1.5rem; color: #E67E22; }
    nav { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
    nav button { padding: 8px 16px; border: 1px solid #FFE082; background: #FFF9E6; color: #5D4037; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: all 0.3s; }
    nav button.active { background: #FFB74D; color: #fff; border-color: #FFB74D; }
    nav button:hover:not(.active) { background: #FFF3E0; }

    .section { display: none; }
    .section.active { display: block; }
    .sub-item { border: 1px solid #FFE082; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #FFFAED; position: relative; }
    .item-title { margin-top: 0; margin-bottom: 10px; font-size: 1.2rem; border-bottom: 2px dashed #FFCC80; padding-bottom: 5px; color: #D35400; }
    
    /* コンテンツ内のテキスト余白を調整 */
    .item-content { font-size: 0.95rem; }
    .item-content p { margin: 5px 0; } 
    .item-content img, .accordion-content img { max-width: 100%; height: auto; border-radius: 8px; display: block; margin: 10px auto; }

    /* ★復活：項目全体のアコーディオン設定 */
    .sub-item.accordion .item-title { cursor: pointer; padding-right: 30px; position: relative; }
    .sub-item.accordion .item-title::after { content: '▼'; position: absolute; right: 5px; top: 50%; transform: translateY(-50%); font-size: 0.9rem; color: #D35400; transition: transform 0.3s; }
    .sub-item.accordion.open .item-title::after { transform: translateY(-50%) rotate(180deg); }
    .sub-item.accordion .item-content { display: none; }
    .sub-item.accordion.open .item-content { display: block; margin-top: 10px; }

    /* --- 本文中のアコーディオンデザイン --- */
    details.inline-accordion { border: 1px solid #FFCC80; border-radius: 4px; margin: 5px 0; background: #fff; }
    details.inline-accordion summary { padding: 10px 15px; font-weight: bold; cursor: pointer; background: #FFF3E0; border-radius: 4px; outline: none; list-style-position: inside; color: #D35400; }
    details.inline-accordion summary:hover { background: #FFE0B2; }
    details.inline-accordion .accordion-content { padding: 15px; border-top: 1px solid #FFCC80; }
    details.inline-accordion .accordion-content p:first-child { margin-top: 0; }
    details.inline-accordion .accordion-content p:last-child { margin-bottom: 0; }

    /* 編集モード関連 */
    .mode-toggle { background: transparent; color: #D35400; border: none; font-size: 1.5rem; cursor: pointer; padding: 5px; border-radius: 50%; transition: transform 0.3s, background 0.3s; line-height: 1; }
    .mode-toggle:hover { transform: rotate(45deg); background: #FFF3E0; }
    body.edit-mode .mode-toggle { background: #FFE0B2; }
    .header-edit-btn { background: #ffa502; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; display: none; }
    
    .save-cloud-btn { display: none; background: #2ed573; color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.9rem; margin-left: 10px; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(46, 213, 115, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0); } }

    .item-actions { display: none; position: absolute; top: 10px; right: 10px; gap: 5px; z-index: 10; }
    .item-actions button { background: #1e90ff; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
    .item-actions .delete-btn { background: #ff4757; }
    .add-item-btn { display: none; width: 100%; padding: 15px; border: 2px dashed #FFB74D; background: transparent; color: #FFB74D; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 1rem; }
    .add-item-btn:hover { background: #FFF3E0; }

    body.edit-mode .header-edit-btn { display: inline-block; }
    body.edit-mode .save-cloud-btn { display: inline-block; }
    body.edit-mode .item-actions { display: flex; }
    body.edit-mode .add-item-btn { display: block; }

    /* モーダル＆ローディング */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(93, 64, 55, 0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #fff; padding: 20px; border-radius: 8px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; position: relative; }
    .close-modal { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; cursor: pointer; color: #666; }
    .save-btn { display: block; width: 100%; padding: 10px; background: #FFB74D; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; margin-top: 15px; font-weight: bold; }
    .save-btn:hover { background: #F39C12; }
    .modal-input-group { margin-bottom: 15px; }
    .modal-input-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: #D35400;}
    .modal-input-group input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #FFCC80; border-radius: 4px; }
    .settings-group { margin-bottom: 15px; border-bottom: 1px solid #FFF3E0; padding-bottom: 15px; }
    .menu-input-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    .menu-input-row input { flex: 1; padding: 8px; border: 1px solid #FFCC80; border-radius: 4px; }
    .delete-menu-btn { background: #ff4757; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
    .add-menu-btn { background: #FFB74D; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-top: 5px; }

    #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFFDF5; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #E67E22; font-weight: bold; font-size: 1.2rem; text-align: center; }
    .spinner { border: 4px solid #FFE082; border-top: 4px solid #FFB74D; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .skip-btn { margin-top: 20px; padding: 10px 20px; background: #FFB74D; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner" id="spinner-icon"></div>
    <div id="loading-text">データを読み込み中...</div>
    <div id="error-actions" style="display: none;">
      <button class="skip-btn" onclick="forceStart()">スキップして初期画面から始める</button>
      <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">※ローカルファイルのセキュリティ制限により通信できない場合があります。</p>
    </div>
  </div>

  <div class="container">
    <header>
      <div class="header-title-area">
        <h1 id="display-title">一ノ瀬なつみ Info</h1>
        <button class="header-edit-btn" onclick="openSettingsModal()">✏️ サイト設定を編集</button>
        <button class="save-cloud-btn" onclick="saveToCloud()">☁️ 変更を公開(保存)</button>
      </div>
      <button class="mode-toggle" onclick="toggleEditMode()" id="modeBtn" title="管理メニュー">⚙️</button>
    </header>

    <nav id="main-nav"></nav>
    <main id="main-content"></main>
  </div>

  <div class="modal-overlay" id="contentModal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal('contentModal')">&times;</span>
      <h3>項目の編集</h3>
      
      <div class="modal-input-group">
        <label>項目の見出し（タイトル）</label>
        <input type="text" id="item-title-input" placeholder="例：プロフィール、TikTok など">
      </div>

      <div class="modal-input-group" style="display: flex; align-items: center; gap: 8px; margin-top: -5px; margin-bottom: 15px;">
        <input type="checkbox" id="item-accordion-checkbox" style="width: 20px; height: 20px; cursor: pointer;">
        <label for="item-accordion-checkbox" style="margin: 0; font-weight: normal; cursor: pointer; padding-top: 2px;">この項目全体をアコーディオン(開閉式)にする</label>
      </div>

      <div class="modal-input-group">
        <label>内容</label>
        <div id="editor" style="height: 250px; border: 1px solid #ccc; background: #fff;"></div>
      </div>
      
      <button class="save-btn" onclick="saveContent()">保存する</button>
    </div>
  </div>

  <div class="modal-overlay" id="settingsModal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeModal('settingsModal')">&times;</span>
      <h3>サイト設定の編集</h3>
      <div class="settings-group"><label>ページタイトル</label><input type="text" id="input-title"></div>
      <div class="settings-group">
        <label>メニュー構成</label>
        <div id="dynamic-menu-list"></div>
        <button class="add-menu-btn" onclick="addMenuInputRow('section-' + Date.now(), '新しいメニュー')">＋ メニューを追加</button>
      </div>
      <button class="save-btn" onclick="saveSettings()">設定を反映する</button>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <script>
    // いただいたGASのURL
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzIEbj4YsC7VlwZkR6Te28MkBV58k4-6KjZFAhXI8ZI4JnRYN16X_nwuUmLlhV5_MDgqg/exec";

    window.onload = function() {
      fetch(GAS_WEB_APP_URL)
        .then(response => response.json())
        .then(data => {
          if (!data.isNew) {
            document.getElementById('display-title').innerText = data.pageTitle;
            document.getElementById('page-title-meta').innerText = data.pageTitle;
            document.getElementById('main-nav').innerHTML = data.navHtml;
            document.getElementById('main-content').innerHTML = data.mainHtml;

            // 保存時の状態に関わらず、必ず一番左のメニュー（トップ）を初期表示する
            const firstNavBtn = document.querySelector('.nav-btn');
            if (firstNavBtn) {
              showSection(firstNavBtn.getAttribute('data-section-id'));
            }
          } else {
            forceStart();
          }
          document.getElementById('loading-screen').style.display = 'none';
        })
        .catch(error => {
          console.error(error);
          document.getElementById('spinner-icon').style.display = 'none';
          document.getElementById('loading-text').innerHTML = "通信エラーが発生しました。<br>GASの設定を確認するか、スキップしてください。";
          document.getElementById('error-actions').style.display = 'block';
        });
    };

    function forceStart() {
      document.getElementById('main-nav').innerHTML = '<button class="nav-btn active" data-section-id="top" onclick="showSection(\'top\')">トップ</button>';
      document.getElementById('main-content').innerHTML = '<section id="top" class="section active"><div class="sub-items-container"></div><button class="add-item-btn" onclick="addNewItem(\'top\')">＋ 新しい項目を追加</button></section>';
      document.getElementById('loading-screen').style.display = 'none';
    }

    function saveToCloud() {
      const loading = document.getElementById('loading-screen');
      document.getElementById('spinner-icon').style.display = 'block';
      document.getElementById('error-actions').style.display = 'none';
      document.getElementById('loading-text').innerText = "クラウドに保存中...";
      loading.style.display = 'flex';
      
      const siteData = {
        pageTitle: document.getElementById('display-title').innerText,
        navHtml: document.getElementById('main-nav').innerHTML,
        mainHtml: document.getElementById('main-content').innerHTML
      };

      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ data: JSON.stringify(siteData) })
      })
      .then(response => response.json())
      .then(data => {
        loading.style.display = 'none';
        if (data.result === 'success') {
          alert('サイトのデータをクラウドに公開(保存)しました！');
        } else {
          alert('保存に失敗しました。');
        }
      })
      .catch(error => {
        console.error(error);
        loading.style.display = 'none';
        alert('通信エラーが発生しました。ブラウザのセキュリティ制限が原因の可能性があります。');
      });
    }

    const icons = Quill.import('ui/icons');
    icons['accordion'] = '<svg viewBox="0 0 18 18"><polygon class="ql-fill" points="4,6 14,6 9,13"></polygon></svg>';
    const quill = new Quill('#editor', {
      theme: 'snow',
      modules: {
        toolbar: {
          container: [ [{ 'header': [1, 2, false] }], ['bold', 'italic', 'underline'], ['image', 'link', 'video'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['accordion'], ['clean'] ],
          handlers: {
            'accordion': function() {
              const range = this.quill.getSelection(true);
              const position = range ? range.index : 0;
              this.quill.insertText(position, '\n【アコーディオン:タイトルを入力】\nここに隠す内容を入力\n【/アコーディオン】\n');
              this.quill.setSelection(position + 15, 6);
            }
          }
        }
      }
    });

    function showSection(sectionId) {
      document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
      const targetSec = document.getElementById(sectionId);
      if(targetSec) targetSec.classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(btn => {
        if (btn.getAttribute('data-section-id') === sectionId) btn.classList.add('active');
        else btn.classList.remove('active');
      });
    }

    let isEditMode = false;
    function toggleEditMode() {
      if (!isEditMode) {
        const pw = prompt('パスワードを入力してください:');
        if (pw === '0000') {
          isEditMode = true;
          document.body.classList.add('edit-mode');
        } else if (pw !== null) alert('パスワードが違います。');
      } else {
        if (confirm('編集モードを終了しますか？（※保存していない内容は公開されません）')) {
          isEditMode = false;
          document.body.classList.remove('edit-mode');
        }
      }
    }

    function closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); }

    // ★追加：項目全体のアコーディオン開閉ロジック
    function toggleAccordion(itemId) {
      const item = document.getElementById(itemId);
      if(item && item.classList.contains('accordion')) {
        item.classList.toggle('open');
      }
    }

    function parseAccordionToHTML(rawHtml) {
      const regex = /(?:<p>)?【アコーディオン:(.*?)】(?:<\/p>)?([\s\S]*?)(?:<p>)?【\/アコーディオン】(?:<\/p>)?/g;
      return rawHtml.replace(regex, function(match, title, content) {
        return `<details class="inline-accordion"><summary>${title}</summary><div class="accordion-content">${content}</div></details>`;
      });
    }

    let currentEditingItemId = null;
    let currentEditingSectionId = null;

    function editItem(itemId) {
      currentEditingItemId = itemId;
      currentEditingSectionId = null;
      const itemEl = document.getElementById(itemId);
      const title = itemEl.querySelector('.item-title').innerText;
      const rawContent = decodeURIComponent(itemEl.getAttribute('data-raw-content') || '');
      
      // アコーディオン設定の状態を取得してチェックボックスに反映
      const isCardAccordion = itemEl.classList.contains('accordion');
      
      document.getElementById('item-title-input').value = title.replace('▼', '').trim(); // ▼マークを除いて表示
      quill.root.innerHTML = rawContent;
      document.getElementById('item-accordion-checkbox').checked = isCardAccordion;
      
      document.getElementById('contentModal').classList.add('active');
    }

    function addNewItem(sectionId) {
      currentEditingItemId = null;
      currentEditingSectionId = sectionId;
      document.getElementById('item-title-input').value = '';
      quill.root.innerHTML = '<p></p>';
      document.getElementById('item-accordion-checkbox').checked = false; // 初期状態はOFF
      document.getElementById('contentModal').classList.add('active');
    }

    function deleteItem(itemId) {
      if(confirm('この項目を削除してもよろしいですか？')) document.getElementById(itemId).remove();
    }

    function saveContent() {
      const title = document.getElementById('item-title-input').value || 'タイトルなし';
      const rawContent = quill.root.innerHTML;
      const displayContent = parseAccordionToHTML(rawContent);
      const isCardAccordion = document.getElementById('item-accordion-checkbox').checked;
      
      if (currentEditingItemId) {
        const itemEl = document.getElementById(currentEditingItemId);
        const titleEl = itemEl.querySelector('.item-title');
        titleEl.innerText = title;
        itemEl.querySelector('.item-content').innerHTML = displayContent;
        itemEl.setAttribute('data-raw-content', encodeURIComponent(rawContent));

        // ★追加：アコーディオンの適用/解除
        if (isCardAccordion) {
          itemEl.classList.add('accordion');
          titleEl.setAttribute('onclick', `toggleAccordion('${currentEditingItemId}')`);
        } else {
          itemEl.classList.remove('accordion', 'open');
          titleEl.removeAttribute('onclick');
        }

      } else if (currentEditingSectionId) {
        const newItemId = 'item-' + Date.now();
        const sectionContainer = document.querySelector(`#${currentEditingSectionId} .sub-items-container`);
        
        // ★追加：新規作成時のアコーディオンクラスとonclick属性
        const accordionClass = isCardAccordion ? 'accordion' : '';
        const onclickAttr = isCardAccordion ? `onclick="toggleAccordion('${newItemId}')"` : '';

        const html = `
          <div class="sub-item ${accordionClass}" id="${newItemId}" data-raw-content="${encodeURIComponent(rawContent)}">
            <div class="item-actions">
              <button onclick="editItem('${newItemId}')">✏️ 編集</button>
              <button class="delete-btn" onclick="deleteItem('${newItemId}')">🗑️ 削除</button>
            </div>
            <h2 class="item-title" ${onclickAttr}>${title}</h2>
            <div class="item-content">${displayContent}</div>
          </div>
        `;
        sectionContainer.insertAdjacentHTML('beforeend', html);
      }
      closeModal('contentModal');
    }

    function openSettingsModal() {
      document.getElementById('input-title').value = document.getElementById('display-title').innerText;
      const menuListContainer = document.getElementById('dynamic-menu-list');
      menuListContainer.innerHTML = ''; 
      document.querySelectorAll('.nav-btn').forEach(btn => { addMenuInputRow(btn.getAttribute('data-section-id'), btn.innerText); });
      document.getElementById('settingsModal').classList.add('active');
    }

    function addMenuInputRow(id, name) {
      const container = document.getElementById('dynamic-menu-list');
      container.insertAdjacentHTML('beforeend', `<div class="menu-input-row"><input type="hidden" class="menu-id" value="${id}"><input type="text" class="menu-name" value="${name}" placeholder="メニュー名"><button class="delete-menu-btn" onclick="this.parentElement.remove()">削除</button></div>`);
    }

    function saveSettings() {
      const newTitle = document.getElementById('input-title').value;
      document.getElementById('display-title').innerText = newTitle;
      document.getElementById('page-title-meta').innerText = newTitle;
      const nav = document.getElementById('main-nav');
      const main = document.getElementById('main-content');
      const keepSectionIds = [];
      nav.innerHTML = '';

      document.querySelectorAll('.menu-input-row').forEach((row, index) => {
        const id = row.querySelector('.menu-id').value;
        const name = row.querySelector('.menu-name').value;
        keepSectionIds.push(id);
        nav.insertAdjacentHTML('beforeend', `<button class="nav-btn ${index===0?'active':''}" data-section-id="${id}" onclick="showSection('${id}')">${name}</button>`);
        if (!document.getElementById(id)) main.insertAdjacentHTML('beforeend', `<section id="${id}" class="section"><div class="sub-items-container"></div><button class="add-item-btn" onclick="addNewItem('${id}')">＋ 新しい項目を追加</button></section>`);
      });

      document.querySelectorAll('.section').forEach(sec => { if (!keepSectionIds.includes(sec.id)) sec.remove(); });
      if (keepSectionIds.length > 0) showSection(keepSectionIds[0]);
      closeModal('settingsModal');
    }
  </script>
</body>
</html>
